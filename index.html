<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gc Biology</title>
<meta name="description" content="Play. Favorite. Build.">
<style>
/* ==========================================================================
   THEME VARIABLES
   ========================================================================== */
:root {
  --radius: 0.75rem;
  --background: oklch(0.99 0.005 240);
  --foreground: oklch(0.145 0 0);
  --card: oklch(1 0 0);
  --muted: oklch(0.96 0.005 240);
  --muted-foreground: oklch(0.5 0 0);
  --accent: oklch(0.95 0.01 240);
  --border: oklch(0.9 0.005 240);
  --input: oklch(0.9 0.005 240);
  --emerald: #059669;
  --emerald-hover: #047857;
  --emerald-soft: rgba(16,185,129,.12);
  --rose: #e11d48;
  --shadow: 0 1px 3px rgba(0,0,0,.08);
  --shadow-lg: 0 10px 30px -10px rgba(0,0,0,.15);
}
[data-theme="dark"] {
  --background: oklch(0.12 0.005 240);
  --foreground: oklch(0.97 0 0);
  --card: oklch(0.17 0.006 240);
  --muted: oklch(0.24 0.006 240);
  --muted-foreground: oklch(0.68 0 0);
  --accent: oklch(0.27 0.006 240);
  --border: rgba(255,255,255,.1);
  --input: rgba(255,255,255,.15);
  --emerald: #10b981;
  --emerald-hover: #059669;
  --emerald-soft: rgba(16,185,129,.15);
  --rose: #f43f5e;
  --shadow: 0 1px 3px rgba(0,0,0,.3);
  --shadow-lg: 0 10px 30px -10px rgba(0,0,0,.5);
}

/* ==========================================================================
   RESET & BASE
   ========================================================================== */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{-webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility}
body{
  font-family:system-ui,-apple-system,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
  background:var(--background);color:var(--foreground);line-height:1.5;
  min-height:100vh;display:flex;flex-direction:column;
  transition:background .2s,color .2s;
}
/* ALL BUTTONS = POINTER CURSOR */
button,[role="button"],a[href],[type="submit"],[type="button"],[type="reset"],
summary,label[for],.clickable{cursor:pointer}
button:disabled,[aria-disabled="true"]{cursor:not-allowed}
a{color:inherit;text-decoration:none}
img{display:block;max-width:100%}
input,textarea{font-family:inherit}

/* Scrollbars */
.scrollbar-thin{scrollbar-width:thin;scrollbar-color:var(--border) transparent}
.scrollbar-thin::-webkit-scrollbar{height:8px;width:8px}
.scrollbar-thin::-webkit-scrollbar-thumb{background:var(--border);border-radius:99px}
.scrollbar-thin::-webkit-scrollbar-track{background:transparent}

/* ==========================================================================
   HEADER
   ========================================================================== */
.header{
  position:sticky;top:0;z-index:40;width:100%;
  border-bottom:1px solid var(--border);
  background:color-mix(in srgb,var(--background) 80%,transparent);
  backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);
}
.header-inner{
  max-width:80rem;margin:0 auto;display:flex;align-items:center;gap:.5rem;
  height:4rem;padding:0 1rem;
}
@media(min-width:640px){.header-inner{gap:1rem;padding:0 1.5rem}}
@media(min-width:1024px){.header-inner{padding:0 2rem}}

.logo-btn{display:flex;align-items:center;gap:.625rem;padding:.25rem .5rem .25rem .25rem;border-radius:.5rem;border:none;background:none}
.logo-badge{
  width:2.25rem;height:2.25rem;border-radius:.5rem;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;color:#fff;
  background:linear-gradient(135deg,#10b981,#0d9488);box-shadow:var(--shadow);
}
.logo-text{display:none;font-size:1rem;font-weight:700;letter-spacing:-.02em}
@media(min-width:640px){.logo-text{display:inline}}

/* Nav tabs */
.nav{
  display:flex;align-items:center;gap:.125rem;border:1px solid var(--border);
  background:var(--muted);border-radius:.5rem;padding:.125rem;
}
.nav-btn{
  position:relative;display:inline-flex;align-items:center;gap:.375rem;
  border:none;background:none;border-radius:.375rem;padding:.375rem .625rem;
  font-size:.875rem;font-weight:500;color:var(--muted-foreground);
  transition:all .15s;
}
@media(min-width:640px){.nav-btn{padding:.375rem .75rem}}
.nav-btn:hover{color:var(--foreground)}
.nav-btn.active{background:var(--card);color:var(--foreground);box-shadow:var(--shadow)}
.nav-badge{
  display:inline-flex;align-items:center;justify-content:center;
  min-width:1rem;height:1rem;padding:0 .25rem;border-radius:99px;
  background:var(--emerald);color:#fff;font-size:.65rem;font-weight:700;line-height:1;
}

/* Search */
.search-wrap{position:relative;flex:1;display:none;align-items:center}
@media(min-width:768px){.search-wrap{display:flex}}
.search-icon{position:absolute;left:.75rem;width:1rem;height:1rem;color:var(--muted-foreground);pointer-events:none}
.search-input{
  width:100%;height:2.5rem;border-radius:.5rem;border:1px solid var(--border);
  background:var(--muted);padding:0 .75rem 0 2.25rem;font-size:.875rem;color:var(--foreground);
  transition:background .15s;
}
.search-input:focus{outline:none;background:var(--card)}
.search-input::placeholder{color:var(--muted-foreground)}

/* Mobile search */
.mobile-search{display:block;border-top:1px solid var(--border);padding:.625rem 1rem}
@media(min-width:768px){.mobile-search{display:none}}
.mobile-search .search-wrap{display:flex}

/* Theme toggle */
.icon-btn{
  width:2.25rem;height:2.25rem;flex-shrink:0;display:inline-flex;align-items:center;
  justify-content:center;border-radius:.5rem;border:1px solid var(--border);
  background:var(--card);color:var(--foreground);transition:all .15s;
}
.icon-btn:hover{background:var(--accent)}

.spacer-flex{flex:1}
@media(min-width:768px){.spacer-flex{display:none}}

/* ==========================================================================
   MAIN / LAYOUT
   ========================================================================== */
.main{flex:1}
.container{max-width:80rem;margin:0 auto;padding:2rem 1rem}
@media(min-width:640px){.container{padding:2.5rem 1.5rem}}
@media(min-width:1024px){.container{padding:2.5rem 2rem}}

.section-title{margin-bottom:1rem}
.eyebrow{font-size:.75rem;font-weight:500;text-transform:uppercase;letter-spacing:.05em;color:var(--muted-foreground)}
.section-title h2{margin-top:.25rem;font-size:1.125rem;font-weight:700;letter-spacing:-.02em}

/* ==========================================================================
   FEATURED HERO
   ========================================================================== */
.hero{
  position:relative;overflow:hidden;border-radius:1rem;border:1px solid var(--border);
  background:var(--card);box-shadow:var(--shadow);margin-bottom:2.5rem;
}
.hero-grid{display:grid;grid-template-columns:1fr}
@media(min-width:768px){.hero-grid{grid-template-columns:1fr 1fr}}
.hero-img-wrap{position:relative;aspect-video;overflow:hidden;background:var(--muted)}
@media(min-width:768px){.hero-img-wrap{aspect:auto;min-height:340px}}
.hero-img-wrap img{width:100%;height:100%;object-fit:cover}
.hero-badge{
  position:absolute;left:.75rem;top:.75rem;border-radius:.375rem;
  border:1px solid rgba(255,255,255,.1);background:rgba(0,0,0,.55);
  padding:.25rem .5rem;font-size:.75rem;font-weight:500;color:#fff;
  backdrop-filter:blur(4px);
}
.hero-body{display:flex;flex-direction:column;justify-content:center;gap:1rem;padding:1.5rem}
@media(min-width:640px){.hero-body{padding:2rem}}
@media(min-width:1024px){.hero-body{padding:2.5rem}}
.hero-eyebrow{display:flex;align-items:center;gap:.5rem;font-size:.875rem;font-weight:600;color:var(--emerald)}
.hero-body h2{font-size:1.5rem;font-weight:700;letter-spacing:-.02em}
@media(min-width:640px){.hero-body h2{font-size:1.875rem}}
.hero-body p.desc{color:var(--muted-foreground);max-width:65ch}
.hero-actions{display:flex;flex-wrap:wrap;align-items:center;gap:.75rem;padding-top:.25rem}

/* ==========================================================================
   BUTTONS
   ========================================================================== */
.btn{
  display:inline-flex;align-items:center;justify-content:center;gap:.5rem;
  white-space:nowrap;border-radius:.5rem;font-size:.875rem;font-weight:500;
  padding:.5rem 1rem;border:none;transition:all .15s;height:2.25rem;
}
.btn:disabled{opacity:.5;pointer-events:none}
.btn-sm{height:2rem;padding:.375rem .75rem;font-size:.875rem}
.btn-lg{height:2.5rem;padding:.5rem 1.5rem;font-size:.95rem}
.btn-icon{width:2.25rem;padding:0}
.btn-primary{background:var(--emerald);color:#fff}
.btn-primary:hover{background:var(--emerald-hover)}
.btn-outline{border:1px solid var(--border);background:var(--card);color:var(--foreground)}
.btn-outline:hover{background:var(--accent)}
.btn-ghost{background:none;color:var(--muted-foreground)}
.btn-ghost:hover{background:var(--accent);color:var(--foreground)}
.btn-emerald{background:var(--emerald);color:#fff}
.btn-emerald:hover{background:var(--emerald-hover)}
.muted-sm{font-size:.875rem;color:var(--muted-foreground)}

/* ==========================================================================
   SECTION HEADER (games grid)
   ========================================================================== */
.grid-header{display:flex;flex-direction:column;gap:1rem;margin-bottom:1.25rem}
@media(min-width:640px){.grid-header{flex-direction:row;align-items:flex-end;justify-content:space-between}}
.grid-header h2{font-size:1.25rem;font-weight:700;letter-spacing:-.02em}
.grid-header p{margin-top:.125rem;font-size:.875rem;color:var(--muted-foreground)}

/* Genre chips */
.chips{display:flex;gap:.5rem;overflow-x:auto;padding-bottom:.25rem}
.chip{
  flex-shrink:0;border-radius:99px;border:1px solid var(--border);
  background:var(--card);padding:.375rem .875rem;font-size:.875rem;font-weight:500;
  color:var(--muted-foreground);transition:all .15s;
}
.chip:hover{border-color:color-mix(in srgb,var(--emerald) 40%,transparent);color:var(--foreground)}
.chip.active{background:var(--emerald);border-color:var(--emerald);color:#fff;box-shadow:var(--shadow)}

/* ==========================================================================
   GAME GRID & CARDS
   ========================================================================== */
.game-grid{display:grid;grid-template-columns:1fr;gap:1.25rem}
@media(min-width:640px){.game-grid{grid-template-columns:repeat(2,1fr)}}
@media(min-width:1024px){.game-grid{grid-template-columns:repeat(3,1fr)}}
@media(min-width:1280px){.game-grid{grid-template-columns:repeat(4,1fr)}}

.game-card{
  position:relative;display:flex;flex-direction:column;overflow:hidden;
  border-radius:.75rem;border:1px solid var(--border);background:var(--card);
  box-shadow:var(--shadow);transition:all .2s;
}
.game-card:hover{transform:translateY(-4px);border-color:color-mix(in srgb,var(--emerald) 50%,transparent);box-shadow:var(--shadow-lg)}
.card-thumb{
  position:relative;aspect-video;width:100%;overflow:hidden;background:var(--muted);
  border:none;padding:0;
}
.card-thumb img{width:100%;height:100%;object-fit:cover;transition:transform .3s}
.game-card:hover .card-thumb img{transform:scale(1.04)}
.card-thumb-fallback{display:flex;align-items:center;justify-content:center;width:100%;height:100%;color:var(--muted-foreground)}
.card-genre{
  position:absolute;left:.625rem;top:.625rem;border-radius:.375rem;
  border:1px solid rgba(255,255,255,.1);background:rgba(0,0,0,.55);
  padding:.125rem .5rem;font-size:.7rem;font-weight:500;color:#fff;backdrop-filter:blur(4px);
}
.card-play{
  position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
  background:rgba(0,0,0,.4);opacity:0;transition:opacity .2s;
}
.game-card:hover .card-play{opacity:1}
.card-play span{
  display:inline-flex;align-items:center;gap:.375rem;border-radius:99px;
  background:var(--emerald);padding:.5rem 1.25rem;font-size:.875rem;font-weight:600;
  color:#fff;box-shadow:var(--shadow-lg);
}
.fav-btn{
  position:absolute;right:.625rem;top:.625rem;z-index:5;width:2rem;height:2rem;
  display:inline-flex;align-items:center;justify-content:center;border-radius:99px;
  border:1px solid rgba(255,255,255,.15);background:rgba(0,0,0,.45);color:rgba(255,255,255,.9);
  backdrop-filter:blur(4px);transition:all .15s;
}
.fav-btn:hover{background:rgba(0,0,0,.65)}
.fav-btn.active{background:var(--rose);border-color:color-mix(in srgb,var(--rose) 60%,transparent);color:#fff;box-shadow:var(--shadow)}
.card-body{display:flex;flex-direction:column;gap:.25rem;padding:1rem;flex:1}
.card-body h3{font-size:.95rem;font-weight:600;letter-spacing:-.01em;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.card-body p{font-size:.875rem;color:var(--muted-foreground);display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}

/* Recent row */
.recent-row{display:flex;gap:1rem;overflow-x:auto;padding:0 .25rem .75rem;margin:0 -.25rem}
.recent-row>*{width:14rem;flex-shrink:0}
@media(min-width:640px){.recent-row>*{width:16rem}}

/* ==========================================================================
   EMPTY STATES
   ========================================================================== */
.empty{
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:.75rem;
  border-radius:1rem;border:1px dashed var(--border);background:var(--muted);
  padding:4rem 1.5rem;text-align:center;
}
.empty-icon{display:flex;align-items:center;justify-content:center;width:3rem;height:3rem;border-radius:99px;background:var(--accent);color:var(--muted-foreground)}
.empty-icon.lg{width:4rem;height:4rem}
.empty-icon.gradient{background:linear-gradient(135deg,#10b981,#0d9488);color:#fff}
.empty h3{font-size:1.125rem;font-weight:600}
.empty p{font-size:.875rem;color:var(--muted-foreground);max-width:28rem}
.empty code{background:var(--accent);padding:.125rem .375rem;border-radius:.25rem;font-family:ui-monospace,"SF Mono",Monaco,monospace;font-size:.75rem;color:var(--foreground)}
.help-box{display:flex;gap:.5rem;border:1px solid var(--border);border-radius:.5rem;background:var(--card);padding:1rem;text-align:left;font-size:.75rem;color:var(--muted-foreground);margin-top:.5rem;max-width:24rem}
.help-box ol{margin-top:.375rem;padding-left:1rem;list-style:decimal}
.help-box li{margin-top:.25rem}
.help-box .help-title{font-weight:600;color:var(--foreground)}

/* ==========================================================================
   FAVORITES VIEW
   ========================================================================== */
.fav-header{display:flex;flex-direction:column;gap:1rem;margin-bottom:1.5rem}
@media(min-width:640px){.fav-header{flex-direction:row;align-items:center;justify-content:space-between}}
.fav-title-row{display:flex;align-items:center;gap:.75rem}
.fav-icon{display:flex;align-items:center;justify-content:center;width:2.75rem;height:2.75rem;border-radius:.75rem;background:linear-gradient(135deg,#f43f5e,#e11d48);color:#fff;box-shadow:var(--shadow)}
.fav-title-row h2{font-size:1.25rem;font-weight:700;letter-spacing:-.02em}
.fav-title-row p{margin-top:.125rem;font-size:.875rem;color:var(--muted-foreground)}

/* ==========================================================================
   CODE EDITOR
   ========================================================================== */
.code-wrap{height:calc(100vh - 8rem);padding:1rem}
@media(min-width:640px){.code-wrap{padding:1rem 1.5rem}}
@media(min-width:1024px){.code-wrap{padding:1rem 2rem}}
.code-container{
  display:flex;flex-direction:column;height:100%;overflow:hidden;
  border-radius:.75rem;border:1px solid var(--border);background:var(--card);box-shadow:var(--shadow);
}
.code-toolbar{display:flex;align-items:center;gap:.5rem;border-bottom:1px solid var(--border);background:var(--muted);padding:.5rem .75rem}
.code-toolbar-title{display:flex;align-items:center;gap:.5rem;font-size:.875rem;font-weight:600}
.code-toolbar-actions{margin-left:auto;display:flex;align-items:center;gap:.25rem}
.code-divider{width:1px;height:1.25rem;background:var(--border);margin:0 .25rem}

.code-body{flex:1;overflow:hidden;display:flex}
.code-editors{display:flex;height:100%;overflow:hidden}
.code-editors.horizontal{flex-direction:row}
.code-editors.vertical{flex-direction:column}

.editor-panel{display:flex;flex-direction:column;overflow:hidden;background:#1e1e2e;flex:1;min-width:0;min-height:0}
.editor-header{display:flex;align-items:center;gap:.5rem;border-bottom:1px solid rgba(255,255,255,.1);padding:.375rem .75rem}
.editor-dot{width:.5rem;height:.5rem;border-radius:99px}
.editor-label{font-size:.75rem;font-weight:600;text-transform:uppercase;letter-spacing:.05em;color:rgba(255,255,255,.7)}
.editor-body{position:relative;display:flex;flex:1;overflow:hidden;font-family:ui-monospace,"SF Mono",Monaco,monospace;font-size:13px;line-height:1.5}
.editor-gutter{user-select:none;overflow:hidden;padding:.75rem .5rem .75rem .75rem;text-align:right;color:rgba(255,255,255,.25)}
.editor-gutter div{height:1.5em}
.editor-textarea{
  flex:1;resize:none;border:none;background:transparent;color:rgba(255,255,255,.9);
  padding:.75rem .75rem .75rem .5rem;font-family:inherit;font-size:inherit;line-height:inherit;
  tab-size:2;-moz-tab-size:2;outline:none;
}
.editor-textarea::placeholder{color:rgba(255,255,255,.2)}
.editor-textarea::-webkit-scrollbar{width:10px;height:10px}
.editor-textarea::-webkit-scrollbar-thumb{background:rgba(255,255,255,.15);border-radius:99px}

/* Resize handle */
.resize-handle{flex-shrink:0;background:var(--border);position:relative}
.resize-handle.horizontal{width:1px;cursor:col-resize}
.resize-handle.vertical{height:1px;cursor:row-resize}
.resize-handle:hover,.resize-handle.dragging{background:var(--emerald)}

/* Preview */
.preview-panel{display:flex;flex-direction:column;background:#fff;flex:1;min-width:0;min-height:0}
.preview-bar{display:flex;align-items:center;gap:.5rem;border-bottom:1px solid #e4e4e7;background:#f4f4f5;padding:.375rem .75rem}
.preview-dots{display:flex;gap:.375rem}
.preview-dots span{width:.625rem;height:.625rem;border-radius:99px}
.preview-label{margin-left:.5rem;font-size:.75rem;font-weight:500;color:#71717a}
.preview-frame{flex:1;border:none;background:#fff;width:100%}

/* ==========================================================================
   GAME PLAYER MODAL
   ========================================================================== */
.modal{position:fixed;inset:0;z-index:50;display:flex;flex-direction:column;background:rgba(0,0,0,.8);backdrop-filter:blur(6px)}
.modal-inner{display:flex;flex-direction:column;height:100%;width:100%}
.modal-bar{display:flex;align-items:center;gap:.5rem;border-bottom:1px solid rgba(255,255,255,.1);background:rgba(9,9,11,.9);padding:.625rem .75rem;color:#fff}
@media(min-width:640px){.modal-bar{gap:.75rem;padding:.625rem 1rem}}
.modal-genre{display:none;flex-shrink:0;border-radius:.375rem;border:1px solid rgba(255,255,255,.15);background:rgba(255,255,255,.05);padding:.125rem .5rem;font-size:.7rem;font-weight:500;color:rgba(255,255,255,.8)}
@media(min-width:640px){.modal-genre{display:inline}}
.modal-title{flex:1;min-width:0;font-size:.875rem;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
@media(min-width:640px){.modal-title{font-size:1rem}}
.modal-actions{display:flex;flex-shrink:0;align-items:center;gap:.25rem}
.modal-btn{display:inline-flex;align-items:center;gap:.375rem;border:none;background:none;border-radius:.375rem;padding:.375rem .5rem;font-size:.875rem;color:rgba(255,255,255,.8);transition:all .15s}
.modal-btn:hover{background:rgba(255,255,255,.1);color:#fff}
.modal-btn.fav{color:#f43f5e}
.modal-btn.fav:hover{color:#fb7185}
.modal-btn-label{display:none}
@media(min-width:640px){.modal-btn-label{display:inline}}
.modal-stage{position:relative;flex:1;background:#09090b}
.modal-loading{position:absolute;inset:0;z-index:10;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:.75rem;color:rgba(255,255,255,.8);padding:1.5rem;text-align:center}
.modal-frame{width:100%;height:100%;border:0}

/* ==========================================================================
   FOOTER
   ========================================================================== */
.footer{margin-top:auto;border-top:1px solid var(--border);background:var(--muted)}
.footer-inner{max-width:80rem;margin:0 auto;display:flex;flex-direction:column;align-items:center;justify-content:space-between;gap:.75rem;padding:1.5rem 1rem;font-size:.875rem;color:var(--muted-foreground)}
@media(min-width:640px){.footer-inner{flex-direction:row;padding:1.5rem 1.5rem}}
@media(min-width:1024px){.footer-inner{padding:1.5rem 2rem}}
.footer-brand{display:flex;align-items:center;gap:.5rem}
.footer-badge{width:1.5rem;height:1.5rem;border-radius:.375rem;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#10b981,#0d9488);color:#fff}
.footer-brand strong{color:var(--foreground);font-weight:600}
.footer-sep{margin:0 .375rem;opacity:.5}

/* ==========================================================================
   HIDDEN
   ========================================================================== */
.hidden{display:none!important}
.skeleton{aspect-video;width:100%;border-radius:.75rem;background:var(--muted);animation:pulse 1.5s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
</style>
</head>
<body>

<!-- ============================ HEADER ============================ -->
<header class="header">
  <div class="header-inner">
    <button class="logo-btn" onclick="setView('games')" id="logo-btn" aria-label="Home">
      <span class="logo-badge" id="logo-badge">

<script>
/* ============================================================================
 * ============================================================================
 *  SITE CONFIGURATION
 * ============================================================================
 *  This is the ONLY section you need to edit. Everything is controlled from
 *  here: your site name, logo, tagline, genres, and games.
 *
 *  ──────────────────────────────────────────────────────────────────────────
 *  1. SITE — your website name, tagline, and logo
 *  ──────────────────────────────────────────────────────────────────────────
 *    name:    The website name shown in the header, footer, and browser tab.
 *    tagline: A short subtitle shown in the footer.
 *    logo:    A URL or relative path to your logo image (square, ~512x512).
 *             Use "" (empty) to keep the built-in gamepad icon.
 *             Examples:  "logo.png"  or  "https://example.com/logo.png"
 *
 *  ──────────────────────────────────────────────────────────────────────────
 *  2. GENRES — edit this list to add / remove / rename genres
 *  ──────────────────────────────────────────────────────────────────────────
 *  The GENRES array controls every genre label shown on the site (filter
 *  chips, card badges, etc.). Add, remove, or rename strings freely.
 *
 *  ──────────────────────────────────────────────────────────────────────────
 *  3. GAMES — paste a game block into the array to add a game
 *  ──────────────────────────────────────────────────────────────────────────
 *  Copy the block below (including the curly braces) and paste it inside the
 *  GAMES array. Fill in the fields:
 *
 *    {
 *      id:          "my-game",              // unique slug
 *      name:        "My Game",              // display name
 *      description: "A short blurb.",       // shown on the card & player
 *      genre:       "Arcade",               // MUST match a genre above
 *      thumbnail:   "thumbs/my-game.jpg",   // image path or URL
 *      fileUrl:     "games/my-game.html",   // HTML file to load
 *      featured:    false,                  // optional: true = hero banner
 *    },
 *
 *  NOTE: Use relative paths (e.g. "games/snake.html") for files in the same
 *  folder as index.html on GitHub. Full URLs also work.
 * ============================================================================
 * ============================================================================
 */

const SITE = {
  name:    "Gc Biology",
  tagline: "Play. Favorite. Build.",
  logo:    "",   // e.g. "logo.png" — leave empty to use the built-in icon
};

const GENRES = [
  "Arcade",
  "Puzzle",
  "Strategy",
  "Action",
  "Adventure",
  "Racing",
];

const GAMES = [
  /* ── Paste your games here ──
  {
    id: "snake",
    name: "Snake",
    description: "The timeless classic. Eat, grow, and never bite your own tail.",
    genre: "Arcade",
    thumbnail: "thumbs/snake.jpg",
    fileUrl: "games/snake.html",
    featured: true,
  },
  */
];


/* ============================================================================
 *  APP LOGIC — you don't need to edit below this line
 * ============================================================================
 */

/* ---------- State ---------- */
let currentView = "games";
let searchQuery = "";
let activeCategory = "All";
let activeGame = null;
let favorites = [];
let recent = [];
let codeLayout = "vertical"; // vertical = editors stacked, horizontal = side by side
let codePreviewKey = 0;

/* ---------- Storage keys ---------- */
const FAV_COOKIE = "arcade:favorites";
const RECENT_KEY = "arcade:recent-games";
const CODE_KEY = "arcade:code-editor";
const THEME_KEY = "arcade:theme";

/* ---------- Default code for the editor ---------- */
const DEFAULT_CODE = {
  html: '<div class="card">\n  <h1>Hello, World! 👋</h1>\n  <p>Edit the HTML, CSS, and JS panels to see live changes.</p>\n  <button id="btn">Click me</button>\n</div>\n',
  css: '* {\n  box-sizing: border-box;\n}\n\nbody {\n  margin: 0;\n  min-height: 100vh;\n  display: grid;\n  place-items: center;\n  font-family: system-ui, sans-serif;\n  background: linear-gradient(135deg, #0f172a, #1e293b);\n  color: #e2e8f0;\n}\n\n.card {\n  text-align: center;\n  padding: 2.5rem 3rem;\n  border-radius: 1rem;\n  background: rgba(30, 41, 59, 0.6);\n  border: 1px solid rgba(148, 163, 184, 0.15);\n  backdrop-filter: blur(8px);\n  box-shadow: 0 20px 60px -20px rgba(0, 0, 0, 0.5);\n}\n\nh1 {\n  margin: 0 0 0.5rem;\n  font-size: 1.75rem;\n}\n\np {\n  margin: 0 0 1.5rem;\n  color: #94a3b8;\n}\n\nbutton {\n  padding: 0.6rem 1.5rem;\n  border: none;\n  border-radius: 0.5rem;\n  font-size: 0.95rem;\n  font-weight: 600;\n  color: white;\n  background: linear-gradient(135deg, #10b981, #14b8a6);\n  cursor: pointer;\n  transition: transform 0.15s ease, box-shadow 0.15s ease;\n}\n\nbutton:hover {\n  transform: translateY(-2px);\n  box-shadow: 0 8px 24px -8px rgba(16, 185, 129, 0.6);\n}\n\nbutton:active {\n  transform: translateY(0);\n}\n',
  js: 'const btn = document.getElementById(\'btn\');\nlet count = 0;\n\nbtn.addEventListener(\'click\', () => {\n  count++;\n  btn.textContent = \'Clicked \' + count + \' times\';\n});\n'
};

let codeState = { html: DEFAULT_CODE.html, css: DEFAULT_CODE.css, js: DEFAULT_CODE.js };

/* ---------- Cookie helpers ---------- */
function getCookie(name) {
  const match = document.cookie.split("; ").find(r => r.startsWith(name + "="));
  return match ? decodeURIComponent(match.split("=").slice(1).join("=")) : null;
}
function setCookie(name, value, maxAgeDays) {
  document.cookie = name + "=" + encodeURIComponent(value) + "; max-age=" + (maxAgeDays * 86400) + "; path=/; SameSite=Lax";
}

/* ---------- Favorites ---------- */
function loadFavorites() {
  const raw = getCookie(FAV_COOKIE);
  if (!raw) return [];
  try { const p = JSON.parse(raw); return Array.isArray(p) ? p.filter(v => typeof v === "string") : []; } catch { return []; }
}
function saveFavorites() {
  setCookie(FAV_COOKIE, JSON.stringify(favorites), 365);
}
function isFavorite(id) { return favorites.includes(id); }
function toggleFavorite(id) {
  if (favorites.includes(id)) favorites = favorites.filter(x => x !== id);
  else favorites.push(id);
  saveFavorites();
  updateFavCount();
  renderCurrentView();
  if (activeGame && activeGame.id === id) updateModalFav();
}
function updateFavCount() {
  const el = document.getElementById("fav-count");
  if (favorites.length > 0) { el.textContent = favorites.length; el.classList.remove("hidden"); }
  else el.classList.add("hidden");
}

/* ---------- Recent games ---------- */
function loadRecent() {
  try { const raw = localStorage.getItem(RECENT_KEY); return raw ? JSON.parse(raw) : []; } catch { return []; }
}
function saveRecent() { try { localStorage.setItem(RECENT_KEY, JSON.stringify(recent)); } catch {} }
function addRecent(game) {
  recent = [game, ...recent.filter(g => g.id !== game.id)].slice(0, 8);
  saveRecent();
}

/* ---------- Helpers ---------- */
function getFeatured() { return GAMES.find(g => g.featured) || GAMES[0]; }
function getGameById(id) { return GAMES.find(g => g.id === id); }
function searchGames(query, category) {
  const q = query.trim().toLowerCase();
  return GAMES.filter(g => {
    const mc = category === "All" || g.genre === category;
    const mq = !q || g.name.toLowerCase().includes(q) || g.description.toLowerCase().includes(q) || g.genre.toLowerCase().includes(q);
    return mc && mq;
  });
}
function escapeHtml(s) { return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;"); }

/* ---------- Theme ---------- */
function loadTheme() {
  const saved = localStorage.getItem(THEME_KEY);
  if (saved) { document.documentElement.setAttribute("data-theme", saved); updateThemeIcon(saved); }
  else { updateThemeIcon(document.documentElement.getAttribute("data-theme")); }
}
function toggleTheme() {
  const cur = document.documentElement.getAttribute("data-theme");
  const next = cur === "dark" ? "light" : "dark";
  document.documentElement.setAttribute("data-theme", next);
  localStorage.setItem(THEME_KEY, next);
  updateThemeIcon(next);
}
function updateThemeIcon(theme) {
  const icon = document.getElementById("theme-icon");
  if (theme === "dark") {
    icon.innerHTML = '<circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>';
  } else {
    icon.innerHTML = '<path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>';
  }
}

/* ---------- View switching ---------- */
function setView(view) {
  currentView = view;
  document.getElementById("view-games").classList.toggle("hidden", view !== "games");
  document.getElementById("view-favorites").classList.toggle("hidden", view !== "favorites");
  document.getElementById("view-code").classList.toggle("hidden", view !== "code");
  document.querySelectorAll(".nav-btn").forEach(b => b.classList.toggle("active", b.dataset.view === view));
  if (view !== "games") { searchQuery = ""; activeCategory = "All"; syncSearchInputs(); }
  renderCurrentView();
  if (view === "code") initCodeEditor();
}
function syncSearchInputs() {
  document.getElementById("search").value = searchQuery;
  document.getElementById("search-mobile").value = searchQuery;
}
function onSearch(val) {
  searchQuery = val;
  syncSearchInputs();
  renderGames();
}
function renderCurrentView() {

/* ---------- Render: Games ---------- */
function renderGames() {
  const container = document.getElementById("view-games");
  const featured = getFeatured();
  const isBrowsing = searchQuery.trim() !== "" || activeCategory !== "All";
  const showHero = !isBrowsing && featured;
  const showRecent = !isBrowsing && recent.length > 0;
  const filtered = searchGames(searchQuery, activeCategory);
  const noGamesAtAll = filtered.length === 0 && !isBrowsing;

  let html = "";

  if (showHero) html += renderHero(featured);
  if (showRecent) html += renderRecent();

  html += '<section>';
  html += '<div class="grid-header"><div>';
  html += '<h2>' + (searchQuery.trim() ? 'Results for &ldquo;' + escapeHtml(searchQuery.trim()) + '&rdquo;' : 'All games') + '</h2>';
  html += '<p>' + filtered.length + (filtered.length === 1 ? ' game' : ' games') + ' available</p>';
  html += '</div>' + renderChips() + '</div>';

  if (filtered.length === 0) {
    html += noGamesAtAll ? renderNoGames() : renderEmptySearch();
  } else {
    html += '<div class="game-grid">';
    filtered.forEach(g => html += renderCard(g));
    html += '</div>';
  }
  html += '</section>';

  container.innerHTML = html;
}

function playGame(id) {
  const game = getGameById(id);
  if (!game) return;
  activeGame = game;
  addRecent(game);
  const modal = document.getElementById("player-modal");
  document.getElementById("modal-genre").textContent = game.genre;
  document.getElementById("modal-title").textContent = game.name;

  const loading = document.getElementById("modal-loading");
  loading.classList.remove("hidden");
  const frame = document.getElementById("modal-frame");
  frame.onload = function() { loading.classList.add("hidden"); };
  frame.src = game.fileUrl;
  modal.classList.remove("hidden");
  document.body.style.overflow = "hidden";
  updateModalFav();
}

  document.getElementById("player-modal").classList.add("hidden");

/* ---------- Code editor ---------- */
let codeInited = false;
let previewTimer = null;

function initCodeEditor() {
  if (!codeInited) {
    codeInited = true;
    // Load saved code
    try {
      const saved = localStorage.getItem(CODE_KEY);
      if (saved) { const p = JSON.parse(saved); if (p) { codeState.html = p.html || DEFAULT_CODE.html; codeState.css = p.css || DEFAULT_CODE.css; codeState.js = p.js || DEFAULT_CODE.js; } }
    } catch {}
    document.getElementById("editor-html").value = codeState.html;
    document.getElementById("editor-css").value = codeState.css;
    document.getElementById("editor-js").value = codeState.js;
    updateAllGutters();
    setupResizeHandles();
    updatePreview();
    // Sync scroll
    ["html","css","js"].forEach(lang => {
      const ta = document.getElementById("editor-" + lang);
      const g = document.getElementById("gutter-" + lang);
      ta.addEventListener("scroll", () => { g.scrollTop = ta.scrollTop; });
    });
    // Fullscreen change
    document.addEventListener("fullscreenchange", () => {
      const icon = document.getElementById("fs-icon");
      if (document.fullscreenElement) {
        icon.innerHTML = '<path d="M8 3v3a2 2 0 0 1-2 2H3m18 0h-3a2 2 0 0 1-2-2V3m0 18v-3a2 2 0 0 1 2-2h3M3 16h3a2 2 0 0 1 2 2v3"/>';
      } else {
        icon.innerHTML = '<path d="M8 3H5a2 2 0 0 0-2 2v3m18 0V5a2 2 0 0 0-2-2h-3m0 18h3a2 2 0 0 0 2-2v-3M3 16v3a2 2 0 0 0 2 2h3"/>';
      }
    });
  }
}

function onCodeInput(lang, value) {
  codeState[lang] = value;
  updateGutter(lang);
  clearTimeout(previewTimer);
  previewTimer = setTimeout(updatePreview, 300);
  saveCodeState();
}

function saveCodeState() {
  try { localStorage.setItem(CODE_KEY, JSON.stringify(codeState)); } catch {}
}

function updateGutter(lang) {
  const ta = document.getElementById("editor-" + lang);
  const g = document.getElementById("gutter-" + lang);
  const lines = ta.value.split("\n").length;
  let html = "";
  for (let i = 1; i <= lines; i++) html += "<div>" + i + "</div>";
  g.innerHTML = html;
  g.scrollTop = ta.scrollTop;
}
function updateAllGutters() { ["html","css","js"].forEach(updateGutter); }

function buildPreviewDoc() {
  return "<!DOCTYPE html>\n<html lang=\"en\">\n<head>\n<meta charset=\"UTF-8\">\n<meta name=\"viewport\" content=\"width=device-width, initial-scale=1.0\">\n<style>\n" + codeState.css + "\n</style>\n</head>\n<body>\n" + codeState.html + "\n<script>\ntry {\n" + codeState.js + "\n} catch (e) {\n  console.error(e);\n  document.body.insertAdjacentHTML('beforeend', '<pre style=\"position:fixed;bottom:0;left:0;right:0;margin:0;padding:8px 12px;background:#1a0a0a;color:#ff6b6b;font:12px/1.5 monospace;white-space:pre-wrap;border-top:1px solid #ff6b6b33;z-index:9999;\">' + String(e && e.stack || e) + '<\\/pre>');\n}\n<\/script>\n</body>\n</html>";
}

function updatePreview() {
  const frame = document.getElementById("preview-frame");
  frame.srcdoc = buildPreviewDoc();
}

function codeReset() {
  codeState = { html: DEFAULT_CODE.html, css: DEFAULT_CODE.css, js: DEFAULT_CODE.js };
  document.getElementById("editor-html").value = codeState.html;
  document.getElementById("editor-css").value = codeState.css;

function codeToggleLayout() {

/* ---------- Resize handles ---------- */
function setupResizeHandles() {
  // Main handle: between editors and preview
  setupHandle(document.getElementById("handle-main"), "code-editors", "preview-panel", "h");
  // Internal handles between editor panels
  const panels = ["panel-html", "panel-css", "panel-js"];
  const handles = document.querySelectorAll("[data-editors]");
  handles.forEach((h, i) => {
    if (i < panels.length - 1) {
      setupHandle(h, panels[i], panels[i+1], codeLayout === "vertical" ? "v" : "h");
    }
  });
}

function setupHandle(handle, leftId, rightId, defaultDir) {
  let dragging = false;
  handle.addEventListener("mousedown", function(e) {
    dragging = true;
    handle.classList.add("dragging");
    document.body.style.userSelect = "none";
    document.body.style.cursor = handle.style.cursor || (handle.classList.contains("horizontal") ? "col-resize" : "row-resize");
    e.preventDefault();
  });
  document.addEventListener("mousemove", function(e) {
    if (!dragging) return;
    const left = document.getElementById(leftId);
    const right = document.getElementById(rightId);
    const container = left.parentElement;
    const rect = container.getBoundingClientRect();
    const isHorizontal = handle.classList.contains("horizontal");
    let pct;
    if (isHorizontal) {
      pct = ((e.clientX - rect.left) / rect.width) * 100;
    } else {
      pct = ((e.clientY - rect.top) / rect.height) * 100;
    }
    pct = Math.max(15, Math.min(85, pct));
    left.style.flex = "none";
    right.style.flex = "none";
    if (isHorizontal) {
      left.style.width = pct + "%";
      right.style.width = (100 - pct) + "%";
      left.style.height = "";
      right.style.height = "";
    } else {
      left.style.height = pct + "%";
      right.style.height = (100 - pct) + "%";
      left.style.width = "";
      right.style.width = "";
    }
  });
  document.addEventListener("mouseup", function() {
    if (dragging) {
      dragging = false;
      handle.classList.remove("dragging");
      document.body.style.userSelect = "";
      document.body.style.cursor = "";
    }
  });
}

  if (logoBadge) {
    if (SITE.logo && SITE.logo.trim() !== "") {
      logoBadge.innerHTML = '<img src="' + escapeHtml(SITE.logo) + '" alt="' + escapeHtml(SITE.name) + ' logo" style="width:100%;height:100%;object-fit:cover" onerror="this.parentNode.innerHTML=window.FALLBACK_LOGO_SVG">';
    } else {
      logoBadge.innerHTML = FALLBACK_LOGO_SVG;
    }
  }

  // Footer name + tagline + copyright name
  const fName = document.getElementById("footer-name");
  if (fName) fName.textContent = SITE.name;
  const fTag = document.getElementById("footer-tagline");
  if (fTag) fTag.textContent = SITE.tagline;
  const fCopy = document.getElementById("footer-copy-name");
  if (fCopy) fCopy.textContent = SITE.name;

  // Footer badge: image if logo URL set, else fallback icon
  const fBadge = document.getElementById("footer-badge");
  if (fBadge) {
    if (SITE.logo && SITE.logo.trim() !== "") {
      fBadge.innerHTML = '<img src="' + escapeHtml(SITE.logo) + '" alt="" style="width:100%;height:100%;object-fit:cover" onerror="this.parentNode.innerHTML=window.FALLBACK_FOOTER_SVG">';
    } else {
      fBadge.innerHTML = FALLBACK_FOOTER_SVG;
    }
  }
}

/* ---------- Init ---------- */
function init() {
  document.getElementById("year").textContent = new Date().getFullYear();
  applySiteConfig();
  loadTheme();
  favorites = loadFavorites();
  recent = loadRecent();
  updateFavCount();
  setView("games");
  updateNavLabels();
  window.addEventListener("resize", updateNavLabels);
}
init();
</script>
